<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — Themis Court Path</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7fafc; color: #2d3748; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; max-width: 500px; padding: 2rem; }
        .error-code { font-size: 6rem; font-weight: 800; color: #1a3a5c; line-height: 1; }
        .error-title { font-size: 1.5rem; color: #1a3a5c; margin: 0.5rem 0 1rem; }
        .error-message { color: #718096; margin-bottom: 2rem; line-height: 1.6; }
        .btn { display: inline-block; padding: 0.75rem 2rem; background: #1a3a5c; color: white; text-decoration: none; border-radius: 6px; font-weight: 600; transition: background 0.2s; }
        .btn:hover { background: #2c5282; }
        .support { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin-bottom: 2rem; }
        .support p { font-size: 0.9rem; color: #718096; }
        .brand { margin-top: 3rem; font-size: 0.8rem; color: #a0aec0; }
        .brand span { color: #c9a84c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">500</div>
        <div class="error-title">Something Went Wrong</div>
        <p class="error-message">
            We encountered an unexpected error while processing your request.
            Your data has not been lost — please try again.
        </p>
        <div class="support">
            <p>If this problem persists, please contact us at
            <strong>support@themiscourtpath.com</strong></p>
        </div>
        <a href="/" class="btn">Return to Home</a>
        <div class="brand">
            <span>&#9878;</span> Themis Court Path &mdash; an Athena Intelligence Division
        </div>
    </div>
</body>
</html>
